# Verbiage: app + Postgres with pgvector. Add your own OPENAI_API_KEY in .env.
# Usage: cp .env.example .env && set OPENAI_API_KEY in .env && docker-compose up --build

services:
  db:
    image: pgvector/pgvector:pg15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: verbiage
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d verbiage"]
      interval: 3s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/verbiage
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  db_data:
