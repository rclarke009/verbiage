# Render Blueprint (https://render.com/docs/blueprint-spec)
#
# Web service: API + Report Writer + RAG. Ingest/vision jobs run on a separate worker
# so OOM during photo analysis does not take down HTTP health checks.
#
# Sub-2GB web instances: RERANK_ENABLED=0 avoids ~100MB CrossEncoder + warm-up 503s.
# Re-enable reranker when the web instance has >=2GB RAM headroom.
#
# Secrets (DATABASE_URL, OPENAI_API_KEY, SUPABASE_*, GOOGLE_*, etc.) use sync: false.
# Worker setup: docs/render-worker-setup.md
services:
  - type: web
    name: rag-document-analysis-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health/ready
    envVars:
      - key: RERANK_ENABLED
        value: "0"
      - key: INGEST_WORKER_ENABLED
        value: "0"
      - key: HF_HOME
        value: /app/hf-cache
      - key: HF_HUB_OFFLINE
        value: "1"
      - key: TRANSFORMERS_OFFLINE
        value: "1"
      - key: DATABASE_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: PUBLIC_APP_URL
        sync: false
      - key: SIGNUP_INVITE_CODE
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REFRESH_TOKEN
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
      - key: GOOGLE_DRIVE_DEFAULT_FOLDER_ID
        sync: false
      - key: GOOGLE_DRIVE_DEFAULT_FOLDER_LABEL
        sync: false

  - type: worker
    name: rag-ingest-worker
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerCommand: python -m app.worker_main
    envVars:
      - key: INGEST_WORKER_ENABLED
        value: "1"
      - key: DATABASE_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REFRESH_TOKEN
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
