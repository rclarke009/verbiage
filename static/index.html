<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verbiage</title>
  <style>
    :root {
      --bg: #f6f8fa;
      --surface: #ffffff;
      --border: #d0d7de;
      --text: #24292f;
      --text-muted: #57606a;
      --accent: #0969da;
      --accent-hover: #0550ae;
      --on-accent: #ffffff;
      --success: #1a7f37;
      --error: #cf222e;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    .layout {
      max-width: 720px;
      margin: 0 auto;
      padding: 1rem 1.5rem 2rem;
    }
    header {
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 1.5rem;
    }
    h1 {
      font-size: 1.25rem;
      font-weight: 600;
      margin: 0;
      margin-right: auto;
    }
    .tabs {
      display: flex;
      gap: 0.25rem;
    }
    .tabs button {
      padding: 0.4rem 0.75rem;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      cursor: pointer;
      font-size: 0.9rem;
    }
    .tabs button:hover {
      background: var(--surface);
    }
    .tabs button.active {
      background: var(--accent);
      border-color: var(--accent);
      color: var(--on-accent);
    }
    .btn-docs {
      padding: 0.4rem 0.75rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      cursor: pointer;
      font-size: 0.9rem;
    }
    .btn-docs:hover {
      background: var(--border);
    }
    .panel {
      display: none;
    }
    .panel.active {
      display: block;
    }
    label {
      display: block;
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 0.25rem;
    }
    input, textarea, select {
      width: 100%;
      padding: 0.5rem 0.6rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 0.95rem;
      margin-bottom: 1rem;
    }
    textarea {
      min-height: 120px;
      resize: vertical;
    }
    button[type="submit"] {
      padding: 0.5rem 1rem;
      background: var(--accent);
      border: none;
      border-radius: 6px;
      color: var(--on-accent);
      font-weight: 500;
      cursor: pointer;
    }
    button[type="submit"]:hover {
      background: var(--accent-hover);
    }
    .message {
      margin-top: 1rem;
      padding: 0.75rem;
      border-radius: 6px;
      font-size: 0.9rem;
    }
    .message.success { background: rgba(63, 185, 80, 0.15); color: var(--success); }
    .message.error { background: rgba(248, 81, 73, 0.15); color: var(--error); }
    .chunks {
      margin-top: 1rem;
      font-size: 0.85rem;
      color: var(--text-muted);
    }
    .chunks summary { cursor: pointer; }
    .chunk { margin: 0.5rem 0; padding: 0.5rem; background: var(--surface); border-radius: 4px; }

    /* Ask result: two columns (reports left, mentions right) */
    .ask-result-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(280px, 1fr);
      gap: 1.5rem;
      margin-top: 1rem;
    }
    @media (max-width: 640px) {
      .ask-result-grid { grid-template-columns: 1fr; }
    }
    .ask-result-left h3,
    .ask-result-right h3 {
      margin: 0 0 0.5rem 0;
      font-size: 1rem;
      font-weight: 600;
    }
    .ask-result-left #ask-answer-text {
      font-size: 0.9rem;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .ask-result-right {
      font-size: 0.85rem;
      color: var(--text-muted);
    }
    .mention-doc {
      margin-bottom: 1rem;
      padding: 0.75rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
    }
    .mention-doc:last-child { margin-bottom: 0; }
    .mention-doc-title {
      font-weight: 600;
      color: var(--text);
      margin-bottom: 0.5rem;
      font-size: 0.9rem;
    }
    .mention-snippet {
      margin: 0.5rem 0;
      padding: 0.5rem;
      background: var(--bg);
      border-radius: 4px;
      font-size: 0.85rem;
      line-height: 1.4;
    }
    .mention-snippet:first-of-type { margin-top: 0; }

    /* Drawer */
    .drawer-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 100;
      display: none;
      align-items: stretch;
      justify-content: flex-end;
    }
    .drawer-overlay.open { display: flex; }
    .drawer {
      width: min(400px, 90vw);
      background: var(--surface);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .drawer-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 1.25rem;
      border-bottom: 1px solid var(--border);
    }
    .drawer-header h2 { margin: 0; font-size: 1rem; }
    .drawer-close {
      background: none;
      border: none;
      color: var(--text);
      cursor: pointer;
      padding: 0.25rem;
      font-size: 1.25rem;
      line-height: 1;
    }
    .drawer-body {
      flex: 1;
      overflow: auto;
      padding: 1rem 1.25rem;
    }
    .doc-list { list-style: none; padding: 0; margin: 0; }
    .doc-item {
      padding: 0.75rem 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.9rem;
    }
    .doc-item:last-child { border-bottom: none; }
    .doc-id { font-weight: 500; color: var(--accent); }
    .doc-meta { color: var(--text-muted); font-size: 0.8rem; margin-top: 0.25rem; }
    .doc-snippet { margin-top: 0.5rem; font-size: 0.8rem; opacity: 0.9; max-height: 3em; overflow: hidden; text-overflow: ellipsis; }
    .drawer-loading, .drawer-empty { color: var(--text-muted); font-size: 0.9rem; }

    /* Auth */
    #auth-panel { max-width: 360px; margin: 2rem auto; padding: 1.5rem; border: 1px solid var(--border); border-radius: 8px; background: var(--surface); }
    #auth-panel h2 { margin: 0 0 1rem 0; font-size: 1.1rem; }
    #auth-panel .auth-error { color: var(--error); font-size: 0.9rem; margin-top: 0.5rem; }
    #auth-panel input { margin-bottom: 0.75rem; }
    #auth-panel button { margin-right: 0.5rem; margin-top: 0.5rem; }
    #app-content { display: none; }
    #app-content.authenticated { display: block; }
    .user-bar { font-size: 0.85rem; color: var(--text-muted); margin-left: auto; display: flex; align-items: center; gap: 0.5rem; }
    .user-bar span { max-width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .user-bar button { padding: 0.25rem 0.5rem; font-size: 0.8rem; }

    /* Google Drive block */
    .drive-block { margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px solid var(--border); }
    .drive-block h3 { margin: 0 0 0.75rem 0; font-size: 1rem; font-weight: 600; }
    .drive-actions { display: flex; flex-wrap: wrap; gap: 0.5rem; align-items: center; margin-bottom: 0.75rem; }
    .drive-actions input[type="text"] { width: 240px; margin: 0; }
    .drive-file-list { max-height: 240px; overflow: auto; border: 1px solid var(--border); border-radius: 6px; padding: 0.5rem; margin: 0.75rem 0; background: var(--surface); }
    .drive-file-item { display: flex; align-items: center; gap: 0.5rem; padding: 0.4rem 0; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
    .drive-file-item:last-child { border-bottom: none; }
    .drive-file-item input[type="checkbox"] { margin: 0; }
    .drive-file-meta { color: var(--text-muted); font-size: 0.8rem; margin-left: 0.25rem; }
    #drive-message { margin-top: 0.5rem; }
  </style>
</head>
<body>
  <div id="auth-panel" class="layout">
    <h2>Sign in to Verbiage</h2>
    <form id="form-auth">
      <label for="auth-email">Email</label>
      <input type="email" id="auth-email" name="email" required placeholder="you@example.com" />
      <label for="auth-password">Password</label>
      <input type="password" id="auth-password" name="password" required placeholder="••••••••" />
      <button type="submit" id="btn-signin">Sign in</button>
      <button type="button" id="btn-signup">Sign up</button>
    </form>
    <p id="auth-error" class="auth-error" hidden></p>
  </div>

  <div id="app-content" class="layout">
    <header>
      <h1>Verbiage</h1>
      <nav class="tabs">
        <button type="button" data-tab="ingest">Ingest</button>
        <button type="button" data-tab="ask" class="active">Ask</button>
      </nav>
      <button type="button" class="btn-docs" id="btn-docs" aria-label="Show ingested documents">Documents</button>
      <div class="user-bar">
        <span id="user-email" title="Signed in"></span>
        <button type="button" id="btn-signout">Sign out</button>
      </div>
    </header>

    <section id="panel-ingest" class="panel">
      <form id="form-ingest">
        <label for="ingest-text">Text to ingest</label>
        <textarea id="ingest-text" name="text" placeholder="Paste report text…"></textarea>
        <label for="ingest-file">Or upload a PDF</label>
        <input type="file" id="ingest-file" name="file" accept=".pdf,application/pdf" />
        <label for="ingest-doc_id">Doc ID (optional; default: generated)</label>
        <input type="text" id="ingest-doc_id" name="doc_id" placeholder="e.g. report-2024-01" />
        <label for="ingest-title">Title (optional)</label>
        <input type="text" id="ingest-title" name="title" placeholder="Report title" />
        <label for="ingest-source">Source (optional)</label>
        <input type="text" id="ingest-source" name="source" placeholder="File or origin" />
        <label for="ingest-chunk_size">Chunk size</label>
        <input type="number" id="ingest-chunk_size" name="chunk_size" value="800" min="1" />
        <label for="ingest-chunk_overlap">Chunk overlap</label>
        <input type="number" id="ingest-chunk_overlap" name="chunk_overlap" value="100" min="0" />
        <button type="submit">Ingest</button>
      </form>
      <div id="ingest-message" class="message" role="alert" hidden></div>

      <div class="drive-block">
        <h3>Google Drive</h3>
        <div class="drive-actions">
          <button type="button" id="drive-test-btn">Test connection</button>
          <input type="text" id="drive-folder-id" placeholder="Folder ID (leave empty for root)" aria-label="Folder ID (optional)" />
          <button type="button" id="drive-list-btn">List files</button>
          <button type="button" id="drive-ingest-btn">Ingest selected</button>
        </div>
        <div id="drive-file-list" class="drive-file-list" hidden></div>
        <div id="drive-empty" class="drawer-empty" hidden>No Google Docs found in this folder.</div>
        <div id="drive-message" class="message" role="alert" hidden></div>
      </div>
    </section>

    <section id="panel-ask" class="panel active">
      <form id="form-ask">
        <label for="ask-question">Question *</label>
        <textarea id="ask-question" name="question" required placeholder="e.g. This report has hail damage to the roof. Give me overview and detailed image verbiage."></textarea>
        <label for="ask-doc_id">Limit to document (optional)</label>
        <select id="ask-doc_id" name="doc_id">
          <option value="">All documents</option>
        </select>
        <label for="ask-top_k">Top K chunks</label>
        <input type="number" id="ask-top_k" name="top_k" value="10" min="1" max="20" />
        <button type="submit">Ask</button>
      </form>
      <div id="ask-message" class="message" role="alert" hidden></div>
      <div id="ask-answer" hidden>
        <div class="ask-result-grid">
          <div class="ask-result-left">
            <h3>Reports</h3>
            <div id="ask-answer-text"></div>
          </div>
          <div class="ask-result-right">
            <h3>Where it's mentioned</h3>
            <div id="ask-mentions"></div>
          </div>
        </div>
      </div>
    </section>
  </div>

  <div class="drawer-overlay" id="drawer-overlay" aria-hidden="true">
    <div class="drawer">
      <div class="drawer-header">
        <h2>Ingested documents</h2>
        <button type="button" class="drawer-close" id="drawer-close" aria-label="Close">×</button>
      </div>
      <div class="drawer-body">
        <div id="drawer-loading" class="drawer-loading" hidden>Loading…</div>
        <div id="drawer-empty" class="drawer-empty" hidden>No documents ingested yet.</div>
        <ul class="doc-list" id="drawer-list"></ul>
      </div>
    </div>
  </div>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

    const TAB_KEY = 'verbiage-tab';
    let supabase = null;

      function getApiBase() {
        return window.location.origin;
      }

      async function getAuthHeaders() {
        if (!supabase) return {};
        const { data: { session } } = await supabase.auth.getSession();
        if (!session || !session.access_token) return {};
        return { Authorization: 'Bearer ' + session.access_token };
      }

      async function apiFetch(url, options = {}) {
        const headers = { ...(options.headers || {}), ...(await getAuthHeaders()) };
        const res = await fetch(url, { ...options, headers });
        if (res.status === 401) {
          supabase.auth.signOut();
          showAuth();
          throw new Error('Session expired. Please sign in again.');
        }
        return res;
      }

      function showAuth() {
        document.getElementById('auth-panel').style.display = 'block';
        document.getElementById('app-content').classList.remove('authenticated');
      }

      function showApp(email) {
        document.getElementById('auth-panel').style.display = 'none';
        document.getElementById('app-content').classList.add('authenticated');
        var el = document.getElementById('user-email');
        if (el) el.textContent = email || 'Signed in';
      }

      async function initAuth() {
        const configRes = await fetch(getApiBase() + '/config');
        const config = await configRes.json().catch(function () { return {}; });
        const url = (config.supabase_url || '').trim();
        const anonKey = (config.supabase_anon_key || '').trim();
        if (!url || !anonKey) {
          document.getElementById('auth-error').textContent = 'Supabase not configured. Set SUPABASE_URL and SUPABASE_ANON_KEY on the server.';
          document.getElementById('auth-error').hidden = false;
          return;
        }
        supabase = createClient(url, anonKey);
        const { data: { session } } = await supabase.auth.getSession();
        if (session && session.user) {
          showApp(session.user.email);
          initTabsAndApi();
        } else {
          showAuth();
          bindAuthForm();
        }
      }

      function bindAuthForm() {
        var form = document.getElementById('form-auth');
        var btnSignUp = document.getElementById('btn-signup');
        var errEl = document.getElementById('auth-error');
        form.addEventListener('submit', async function (e) {
          e.preventDefault();
          errEl.hidden = true;
          var email = form.email.value.trim();
          var password = form.password.value;
          try {
            const { data, error } = await supabase.auth.signInWithPassword({ email, password });
            if (error) throw error;
            showApp(data.user.email);
            initTabsAndApi();
          } catch (err) {
            errEl.textContent = err.message || 'Sign in failed';
            errEl.hidden = false;
          }
        });
        btnSignUp.addEventListener('click', async function () {
          errEl.hidden = true;
          var email = form.email.value.trim();
          var password = form.password.value;
          if (!email || !password) {
            errEl.textContent = 'Email and password required';
            errEl.hidden = false;
            return;
          }
          try {
            const { data, error } = await supabase.auth.signUp({ email, password });
            if (error) throw error;
            showApp(data.user && data.user.email);
            initTabsAndApi();
          } catch (err) {
            errEl.textContent = err.message || 'Sign up failed';
            errEl.hidden = false;
          }
        });
      }

      function initTabsAndApi() {
        bindTabs();
        bindIngestForm();
        bindDriveBlock();
        bindAskForm();
        bindDrawer();
        refreshDocsSelect();
        document.getElementById('btn-signout').addEventListener('click', async function () {
          if (supabase) await supabase.auth.signOut();
          showAuth();
        });
      }

      function bindTabs() {
        const tabButtons = document.querySelectorAll('[data-tab]');
        const panels = document.querySelectorAll('.panel');
        function setTab(name) {
          tabButtons.forEach(function (btn) {
            btn.classList.toggle('active', btn.getAttribute('data-tab') === name);
          });
          panels.forEach(function (panel) {
            panel.classList.toggle('active', panel.id === 'panel-' + name);
          });
          try { localStorage.setItem(TAB_KEY, name); } catch (e) {}
        }
        tabButtons.forEach(function (btn) {
          btn.addEventListener('click', function () { setTab(btn.getAttribute('data-tab')); });
        });
        var saved = null;
        try { saved = localStorage.getItem(TAB_KEY); } catch (e) {}
        if (saved === 'ingest' || saved === 'ask') setTab(saved);
      }

      async function refreshDocsSelect() {
        const select = document.getElementById('ask-doc_id');
        if (!select) return;
        try {
          const res = await apiFetch(getApiBase() + '/documents');
          const data = await res.json();
          const docs = data.documents || [];
          const keep = select.querySelector('option[value=""]');
          select.innerHTML = '';
          if (keep) select.appendChild(keep);
          docs.forEach(function (d) {
            const opt = document.createElement('option');
            opt.value = d.doc_id;
            opt.textContent = (d.title || d.doc_id) + ' (' + d.num_chunks + ' chunks)';
            select.appendChild(opt);
          });
        } catch (e) {}
      }

      function bindIngestForm() {
        document.getElementById('form-ingest').addEventListener('submit', async function (e) {
          e.preventDefault();
          const msg = document.getElementById('ingest-message');
          msg.hidden = true;
          const form = e.target;
          const fileInput = document.getElementById('ingest-file');
          const file = fileInput.files && fileInput.files[0];
          const usePdf = file && file.name && file.name.toLowerCase().endsWith('.pdf');

          if (usePdf) {
            const formData = new FormData();
            formData.append('file', file);
            if (form.doc_id.value.trim()) formData.append('doc_id', form.doc_id.value.trim());
            if (form.title.value.trim()) formData.append('title', form.title.value.trim());
            if (form.source.value.trim()) formData.append('source', form.source.value.trim());
            formData.append('chunk_size', form.chunk_size.value || '800');
            formData.append('chunk_overlap', form.chunk_overlap.value || '100');
            try {
              const res = await apiFetch(getApiBase() + '/ingest/file', { method: 'POST', body: formData });
              const data = await res.json().catch(function () { return {}; });
              if (!res.ok) {
                var detailStr = typeof data.detail === 'string' ? data.detail : (Array.isArray(data.detail) && data.detail[0] ? data.detail[0].msg : (data.detail && data.detail.msg ? data.detail.msg : null));
                msg.textContent = detailStr || res.statusText || 'Ingest failed';
                msg.className = 'message error';
                msg.hidden = false;
                return;
              }
              msg.textContent = 'Ingested: ' + (data.doc_id || '') + ' (' + (data.num_chunks || 0) + ' chunks).';
              msg.className = 'message success';
              msg.hidden = false;
              fileInput.value = '';
              refreshDocsSelect();
            } catch (err) {
              msg.textContent = (err && err.message) || 'Request failed';
              msg.className = 'message error';
              msg.hidden = false;
            }
            return;
          }

          const text = form.text.value.trim();
          if (!text) {
            msg.textContent = 'Paste text or upload a PDF to ingest.';
            msg.className = 'message error';
            msg.hidden = false;
            return;
          }
          const body = {
            text: text,
            chunking_options: {
              chunk_size: parseInt(form.chunk_size.value, 10) || 800,
              chunk_overlap: parseInt(form.chunk_overlap.value, 10) || 100
            }
          };
          if (form.doc_id.value.trim()) body.doc_id = form.doc_id.value.trim();
          if (form.title.value.trim()) body.title = form.title.value.trim();
          if (form.source.value.trim()) body.source = form.source.value.trim();
          try {
            const res = await apiFetch(getApiBase() + '/ingest', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(body)
            });
            const data = await res.json().catch(function () { return {}; });
            if (!res.ok) {
              var detailStr = typeof data.detail === 'string' ? data.detail : (Array.isArray(data.detail) && data.detail[0] ? data.detail[0].msg : (data.detail && data.detail.msg ? data.detail.msg : null));
              msg.textContent = detailStr || res.statusText || 'Ingest failed';
              msg.className = 'message error';
              msg.hidden = false;
              return;
            }
            msg.textContent = 'Ingested: ' + (data.doc_id || '') + ' (' + (data.num_chunks || 0) + ' chunks).';
            msg.className = 'message success';
            msg.hidden = false;
            refreshDocsSelect();
          } catch (err) {
            msg.textContent = (err && err.message) || 'Request failed';
            msg.className = 'message error';
            msg.hidden = false;
          }
        });
      }

      function bindDriveBlock() {
        const testBtn = document.getElementById('drive-test-btn');
        const listBtn = document.getElementById('drive-list-btn');
        const ingestBtn = document.getElementById('drive-ingest-btn');
        const folderInput = document.getElementById('drive-folder-id');
        const fileListEl = document.getElementById('drive-file-list');
        const emptyEl = document.getElementById('drive-empty');
        const driveMsg = document.getElementById('drive-message');
        const ingestMsg = document.getElementById('ingest-message');

        function showDriveMsg(text, isError) {
          driveMsg.textContent = text;
          driveMsg.className = 'message ' + (isError ? 'error' : 'success');
          driveMsg.hidden = false;
        }

        testBtn.addEventListener('click', async function () {
          driveMsg.hidden = true;
          testBtn.disabled = true;
          try {
            const res = await apiFetch(getApiBase() + '/drive/test');
            const data = await res.json().catch(function () { return {}; });
            if (!res.ok) {
              showDriveMsg(data.detail || res.statusText || 'Connection failed', true);
              return;
            }
            showDriveMsg('Connection OK.', false);
          } catch (err) {
            showDriveMsg((err && err.message) || 'Request failed', true);
          } finally {
            testBtn.disabled = false;
          }
        });

        listBtn.addEventListener('click', async function () {
          driveMsg.hidden = true;
          emptyEl.hidden = true;
          fileListEl.hidden = true;
          fileListEl.innerHTML = '';
          listBtn.disabled = true;
          try {
            const folderId = (folderInput && folderInput.value) ? folderInput.value.trim() : '';
            const url = getApiBase() + '/drive/files' + (folderId ? '?folder_id=' + encodeURIComponent(folderId) : '');
            const res = await apiFetch(url);
            const data = await res.json().catch(function () { return {}; });
            if (!res.ok) {
              showDriveMsg(data.detail || res.statusText || 'List failed', true);
              return;
            }
            const files = data.files || [];
            if (files.length === 0) {
              emptyEl.hidden = false;
              showDriveMsg('No Google Docs found.', false);
              return;
            }
            files.forEach(function (f) {
              const item = document.createElement('div');
              item.className = 'drive-file-item';
              const cb = document.createElement('input');
              cb.type = 'checkbox';
              cb.value = f.id;
              cb.id = 'drive-cb-' + f.id;
              const label = document.createElement('label');
              label.htmlFor = cb.id;
              label.style.cursor = 'pointer';
              label.appendChild(document.createTextNode(f.name || f.id));
              if (f.modifiedTime) {
                const meta = document.createElement('span');
                meta.className = 'drive-file-meta';
                meta.textContent = ' \u2022 ' + f.modifiedTime.slice(0, 10);
                label.appendChild(meta);
              }
              item.appendChild(cb);
              item.appendChild(label);
              fileListEl.appendChild(item);
            });
            fileListEl.hidden = false;
            showDriveMsg('Found ' + files.length + ' Google Doc(s). Select and click Ingest selected.', false);
          } catch (err) {
            showDriveMsg((err && err.message) || 'Request failed', true);
          } finally {
            listBtn.disabled = false;
          }
        });

        ingestBtn.addEventListener('click', async function () {
          const checkboxes = fileListEl.querySelectorAll('input[type="checkbox"]:checked');
          const ids = Array.from(checkboxes).map(function (cb) { return cb.value; }).filter(Boolean);
          if (ids.length === 0) {
            ingestMsg.textContent = 'Select one or more files from the list above, then click Ingest selected.';
            ingestMsg.className = 'message error';
            ingestMsg.hidden = false;
            return;
          }
          ingestMsg.hidden = true;
          ingestBtn.disabled = true;
          try {
            const res = await apiFetch(getApiBase() + '/ingest/google-drive', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ file_ids: ids })
            });
            const data = await res.json().catch(function () { return {}; });
            if (!res.ok) {
              ingestMsg.textContent = data.detail || res.statusText || 'Ingest failed';
              ingestMsg.className = 'message error';
              ingestMsg.hidden = false;
              return;
            }
            var summary = 'Ingested: ' + (data.ingested || 0);
            if (data.skipped) summary += ', skipped: ' + data.skipped;
            if (data.errors && data.errors.length) summary += '. Errors: ' + data.errors.join('; ');
            ingestMsg.textContent = summary;
            ingestMsg.className = 'message success';
            ingestMsg.hidden = false;
            refreshDocsSelect();
          } catch (err) {
            ingestMsg.textContent = (err && err.message) || 'Request failed';
            ingestMsg.className = 'message error';
            ingestMsg.hidden = false;
          } finally {
            ingestBtn.disabled = false;
          }
        });
      }

      function bindAskForm() {
        document.getElementById('form-ask').addEventListener('submit', async function (e) {
          e.preventDefault();
          const msg = document.getElementById('ask-message');
          const answerBlock = document.getElementById('ask-answer');
          const answerText = document.getElementById('ask-answer-text');
          const mentionsBlock = document.getElementById('ask-mentions');
          msg.hidden = true;
          answerBlock.hidden = true;
          const form = e.target;
          const body = {
            question: form.question.value.trim(),
            top_k: parseInt(form.top_k.value, 10) || 10
          };
          if (form.doc_id.value.trim()) body.doc_id = form.doc_id.value.trim();
          try {
            const res = await apiFetch(getApiBase() + '/ask', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(body)
            });
            const data = await res.json().catch(function () { return {}; });
            if (!res.ok) {
              msg.textContent = data.detail || res.statusText || 'Ask failed';
              msg.className = 'message error';
              msg.hidden = false;
              return;
            }
            answerText.textContent = data.answer || '';
            mentionsBlock.innerHTML = '';
            var byDoc = {};
            (data.top_chunks || []).forEach(function (c) {
              if (!byDoc[c.doc_id]) byDoc[c.doc_id] = [];
              byDoc[c.doc_id].push(c);
            });
            Object.keys(byDoc).forEach(function (docId) {
              var docChunks = byDoc[docId];
              var docSection = document.createElement('div');
              docSection.className = 'mention-doc';
              var title = document.createElement('div');
              title.className = 'mention-doc-title';
              title.textContent = docId;
              docSection.appendChild(title);
              docChunks.forEach(function (c) {
                var snip = document.createElement('div');
                snip.className = 'mention-snippet';
                snip.textContent = c.content_snippet || '';
                docSection.appendChild(snip);
              });
              mentionsBlock.appendChild(docSection);
            });
            answerBlock.hidden = false;
          } catch (err) {
            msg.textContent = (err && err.message) || 'Request failed';
            msg.className = 'message error';
            msg.hidden = false;
          }
        });
      }

      function bindDrawer() {
        const overlay = document.getElementById('drawer-overlay');
        const drawerList = document.getElementById('drawer-list');
        const drawerLoading = document.getElementById('drawer-loading');
        const drawerEmpty = document.getElementById('drawer-empty');
        function escapeHtml(s) {
          if (s == null) return '';
          var div = document.createElement('div');
          div.textContent = s;
          return div.innerHTML;
        }
        async function openDrawer() {
          overlay.classList.add('open');
          overlay.setAttribute('aria-hidden', 'false');
          drawerLoading.hidden = false;
          drawerEmpty.hidden = true;
          drawerList.innerHTML = '';
          try {
            const res = await apiFetch(getApiBase() + '/documents');
            const data = await res.json();
            drawerLoading.hidden = true;
            const docs = data.documents || [];
            if (docs.length === 0) {
              drawerEmpty.hidden = false;
              return;
            }
            docs.forEach(function (d) {
              const li = document.createElement('li');
              li.className = 'doc-item';
              li.innerHTML =
                '<span class="doc-id">' + escapeHtml(d.doc_id) + '</span>' +
                '<div class="doc-meta">' + escapeHtml(d.title || '') + (d.source ? ' · ' + escapeHtml(d.source) : '') + ' · ' + (d.num_chunks || 0) + ' chunks</div>' +
                (d.snippet ? '<div class="doc-snippet">' + escapeHtml(d.snippet) + '</div>' : '');
              drawerList.appendChild(li);
            });
          } catch (e) {
            drawerLoading.hidden = true;
            drawerEmpty.textContent = 'Failed to load documents.';
            drawerEmpty.hidden = false;
          }
        }
        function closeDrawer() {
          overlay.classList.remove('open');
          overlay.setAttribute('aria-hidden', 'true');
        }
        document.getElementById('btn-docs').addEventListener('click', openDrawer);
        document.getElementById('drawer-close').addEventListener('click', closeDrawer);
        overlay.addEventListener('click', function (e) {
          if (e.target === overlay) closeDrawer();
        });
      }

      initAuth();
  </script>
</body>
</html>
