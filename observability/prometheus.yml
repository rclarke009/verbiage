# Scrape Verbiage GET /metrics (requires METRICS_ENABLED=true on the app).
# - verbiage-local: API on the host at :8000 (uvicorn or root docker-compose app service)
# - verbiage-prod: Render production (secrets/metrics_token must match Render METRICS_TOKEN)

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: verbiage-local
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:8000"]
    # Bearer token must match METRICS_TOKEN in the app .env (see secrets/metrics_token).
    authorization:
      type: Bearer
      credentials_file: /etc/prometheus/secrets/metrics_token

  - job_name: verbiage-prod
    scheme: https
    metrics_path: /metrics
    static_configs:
      - targets: ["rag-document-analysis-backend.onrender.com"]
    authorization:
      type: Bearer
      credentials_file: /etc/prometheus/secrets/metrics_token
